<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Little Blue Hut</title>
<link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:Arial, Helvetica, sans-serif;
  background:#f4fbff;
  color:#12343b;
}

h1,h2,h3{margin:0 0 10px}
section{padding:40px 20px; max-width:1000px; margin:auto}

header{
  background:#0e4d64;
  color:white;
  position:sticky;
  top:0;
  z-index:1000;
}

.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  gap:15px;
}

.logo-socials{
  display:flex;
  align-items:center;
  gap:20px;
  min-width:0;
  flex:1;
}

.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:28px;
  font-family:'Lobster', cursive;
  line-height:1;
  flex-shrink:0;
}

.logo img{
  height:50px;
  width:auto;
  display:block;
}

.socials{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  align-items:center;
}

.socials a{
  color:white;
  text-decoration:none;
  padding:8px 12px;
  background:rgba(255,255,255,0.1);
  border-radius:6px;
  transition:background 0.2s;
  white-space:nowrap;
}

.socials a:hover{
  background:rgba(255,255,255,0.25);
}

.hamburger{
  font-size:26px;
  cursor:pointer;
  flex-shrink:0;
}

.menu{
  display:none;
  flex-direction:column;
  background:#0e4d64;
}

.menu a{
  color:white;
  text-decoration:none;
  padding:14px 20px;
  border-top:1px solid rgba(255,255,255,0.2);
}

.menu a:hover{
  background:#156f8c;
}

.dropdown-content,
.review-content,
.boat-content{
  display:none;
  padding:15px;
  margin:10px 20px;
  border-radius:8px;
}

.dropdown-content{
  background:#0e4d64;
  max-height:450px;
  overflow-y:auto;
}

.dropdown-content ul{
  list-style:none;
  padding:0;
  margin:0;
}

.dropdown-content li{
  color:white;
  padding:6px 0;
  border-bottom:1px solid rgba(255,255,255,0.2);
}

.dropdown-content h3,
.review-content h3{
  color:white;
  border-bottom:1px solid rgba(255,255,255,0.2);
  padding-bottom:4px;
  margin-top:10px;
}

.review-content{
  background:#0e4d64;
}

.review-content p{
  color:white;
  margin:8px 0;
}

.boat-content{
  background:#e0f7ff;
  color:#0e4d64;
  border:1px solid rgba(14,77,100,0.2);
}

.boat-content h3{
  color:#0e4d64;
  border-bottom:1px solid rgba(14,77,100,0.2);
  padding-bottom:4px;
}

.boat-content p{
  margin:10px 0;
  line-height:1.5;
}

.boat-divider{
  border-top:1px dashed rgba(14,77,100,0.35);
  margin:18px 0;
}

.boat-booking-bar{
  background:#0e4d64;
  color:white;
  padding:14px;
  margin-top:20px;
  border-radius:8px;
  text-align:center;
  font-size:18px;
  font-weight:bold;
}

.boat-booking-bar a{
  color:white;
  text-decoration:none;
}

.boat-booking-bar a:hover{
  text-decoration:underline;
}

.hero{
  background:#b9e6ff;
  text-align:center;
  padding:60px 20px;
}

.hero h1{
  font-size:38px;
  font-family:'Lobster', cursive;
}

.whatsapp-btn{
  display:inline-block;
  margin-top:20px;
  background:#25D366;
  color:#fff;
  padding:14px 22px;
  border-radius:8px;
  text-decoration:none;
  font-size:18px;
  font-weight:bold;
}

.whatsapp-btn:hover{
  opacity:0.9;
}

iframe{
  width:100%;
  height:300px;
  border:0;
  border-radius:10px;
}

footer{
  background:#0e4d64;
  color:white;
  text-align:center;
  padding:20px;
}

#about, #find, #hours{
  scroll-margin-top:90px;
}

#about h2, #find h2, #hours h2{
  font-family:'Lobster', cursive;
  font-size:32px;
}
</style>
</head>

<body>

  <div class="navbar">
    <div class="logo-socials">
      <div class="logo">
        <img src="images/logo.JPG" alt="The Little Blue Hut Logo">
        <span>The Little Blue Hut</span>
      </div>

      <div class="socials">
        <a href="https://www.facebook.com/trawlermanscatch" target="_blank">Facebook</a>
        <a href="https://www.instagram.com/thelittlebluehut_qb" target="_blank">Instagram</a>
        <a href="https://www.tiktok.com/@thelittlebluehut.qb" target="_blank">TikTok</a>
      </div>
    </div>

    <div class="hamburger" onclick="toggleMenu()">☰</div>
  </div>

  <nav class="menu" id="menu">
    <a href="#about">About</a>
    <a href="javascript:void(0)" onclick="toggleDropdown()">Menu ▾</a>

    <div id="menuDropdown" class="dropdown-content">
